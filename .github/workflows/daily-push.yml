name: daily push

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  send-push:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: use node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: send daily push
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: node .github/scripts/send-push.js
