<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icon.png" />
  <title>For You 💌</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
      background: #fff;
      color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      width: min(760px, 92vw);
      padding: 28px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      background: #fff;
    }

    .title {
      font-size: 30px;
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 24px;
    }

    .phrase {
      font-size: 18px;
      line-height: 1.45;
      padding: 24px 20px;
      border-radius: 24px;
      background: rgba(0,0,0,0.035);
      text-align: center;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      min-height: 120px;
      max-height: 44vh;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .phrase span {
      display: block;
      width: 100%;
    }

    .row {
      display: flex;
      gap: 14px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 1px solid rgba(0,0,0,0.12);
      background: #fff;
      padding: 14px 20px;
      border-radius: 18px;
      font-size: 16px;
      cursor: pointer;
    }

    button.primary {
      border-color: #111;
      background: #111;
      color: #fff;
    }

    .list {
      margin-top: 18px;
      display: none;
      max-height: 42vh;
      overflow: auto;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 18px;
      padding: 10px;
      box-sizing: border-box;
    }

    .item {
      padding: 12px 14px;
      border-radius: 12px;
      cursor: pointer;
    }

    .item:hover {
      background: rgba(0,0,0,0.035);
    }

    .item small {
      opacity: 0.55;
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
    }

    @media (max-width: 700px) {
      body {
        padding: 14px;
      }

      .card {
        width: 100%;
        padding: 18px;
        border-radius: 20px;
      }

      .title {
        font-size: 22px;
        margin-bottom: 18px;
      }

      .phrase {
        font-size: 16px;
        min-height: 110px;
        padding: 18px 16px;
        border-radius: 18px;
      }

      button {
        font-size: 15px;
        padding: 13px 16px;
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Asya has a message for you</div>

    <div class="phrase">
      <span id="phrase">loading...</span>
    </div>

    <div class="row">
      <button class="primary" id="btnNext">Show another</button>
      <button id="btnToggleList">Browse all</button>
    </div>

    <div class="list" id="list"></div>
  </div>

  <script>
    const START_DATE = "2026-03-04";
    const SHUFFLE_SEED = "asya-tema-seed-v1";

    let phrases = [];
    let currentIndex = -1;
    let currentOrder = [];

    function daysSinceStart(startDateString) {
      const start = new Date(startDateString + "T00:00:00");
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const startDay = new Date(start.getFullYear(), start.getMonth(), start.getDate());
      const msPerDay = 1000 * 60 * 60 * 24;
      return Math.max(0, Math.floor((today - startDay) / msPerDay));
    }

    function hashString(str) {
      let h = 2166136261;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function createRng(seed) {
      let a = seed >>> 0;
      return function() {
        a += 0x6D2B79F5;
        let t = a;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function shuffledIndices(length, cycleNumber) {
      const arr = Array.from({ length }, (_, i) => i);
      const seed = hashString(`${SHUFFLE_SEED}-${cycleNumber}-${length}`);
      const rand = createRng(seed);

      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getTodayState() {
      const total = phrases.length;
      if (!total) return { phraseIndex: -1, order: [], position: -1 };

      const dayOffset = daysSinceStart(START_DATE);
      const cycleNumber = Math.floor(dayOffset / total);
      const position = dayOffset % total;
      const order = shuffledIndices(total, cycleNumber);
      const phraseIndex = order[position];

      return { phraseIndex, order, position };
    }

    function setPhrase(index) {
      currentIndex = index;
      document.getElementById("phrase").innerText = phrases[index] || "";
    }

    function showNextPhrase() {
      if (!phrases.length || !currentOrder.length) return;
      const currentPos = currentOrder.indexOf(currentIndex);
      const nextPos = (currentPos + 1) % currentOrder.length;
      setPhrase(currentOrder[nextPos]);
    }

    function renderList(todayIndex) {
      const listEl = document.getElementById("list");
      if (!phrases.length) return;

      listEl.innerHTML = phrases
        .map((phrase, index) => {
          const label = index === todayIndex ? "today" : `#${index + 1}`;
          return `
            <div class="item" data-i="${index}">
              <small>${label}</small>
              <div>${phrase}</div>
            </div>
          `;
        })
        .join("");

      listEl.querySelectorAll(".item").forEach((item) => {
        item.addEventListener("click", () => {
          setPhrase(Number(item.dataset.i));
        });
      });
    }

    async function loadPhrases() {
      const response = await fetch("./phrases.json", { cache: "no-store" });
      phrases = await response.json();

      const todayState = getTodayState();
      currentOrder = todayState.order;
      setPhrase(todayState.phraseIndex);
      renderList(todayState.phraseIndex);
    }

    document.getElementById("btnNext")?.addEventListener("click", showNextPhrase);

    const listEl = document.getElementById("list");
    document.getElementById("btnToggleList")?.addEventListener("click", () => {
      const isOpen = listEl.style.display === "block";
      listEl.style.display = isOpen ? "none" : "block";
    });

    loadPhrases().catch((e) => {
      document.getElementById("phrase").innerText = "failed to load phrases";
      console.error(e);
    });
  </script>
</body>
</html>
