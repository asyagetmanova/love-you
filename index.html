<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icon.png" />

  <title>For You 💌</title>

  <style>
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
      background: #fff;
      color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      width: min(520px, 92vw);
      padding: 22px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }
    
    .title {
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.2px;
      opacity: 1;
      margin-bottom: 14px;
    }

    .phrase {
      font-size: 20px;
      line-height: 1.35;
      padding: 18px 16px;
      border-radius: 14px;
      background: rgba(0,0,0,0.03);
      user-select: none;
    
      /* центрирование текста */
      text-align: center;
    
      /* чтобы переносы работали для длинных текстов */
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    
      /* чтобы блок выглядел хорошо и на 1 строке, и на 10 */
      min-height: 84px;          /* короткие не "приплюснуты" */
      max-height: 44vh;          /* длинные не раздувают всю карточку */
      overflow: auto;            /* если прям длинно — прокрутка внутри */
      display: flex;
      align-items: center;       /* приятная вертикальная центровка */
      justify-content: center;
    }
    
    .row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    button {
      appearance: none;
      border: 1px solid rgba(0,0,0,0.12);
      background: #fff;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
    }
    button.primary {
      border-color: rgba(0,0,0,0.08);
      background: #111;
      color: #fff;
    }
    .muted { margin-top: 10px; font-size: 12px; opacity: 0.65; }
    .list {
      margin-top: 14px;
      display: none;
      max-height: 44vh;
      overflow: auto;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      padding: 10px;
    }
    .item {
      padding: 10px;
      border-radius: 10px;
    }
    .item:hover { background: rgba(0,0,0,0.03); }
    .item small { opacity: 0.6; }
  </style>

  <!-- OneSignal Web Push SDK -->
  <script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js" async=""></script>
</head>
<body>
  <div class="card">
    <div class="title">💌 Asya has a message for you</div>

    <div class="phrase"><span id="phrase">Loading…</span></div>

    <div class="row">
      <button class="primary" id="btnNext">Show another</button>
      <button id="btnToggleList">Browse all</button>
      <button id="btnEnablePush">Enable notifications</button>
    </div>

    <div class="muted" id="hint">
      Tip: on iPhone, install this to Home Screen to receive push notifications (iOS 16.4+).
    </div>

    <div class="list" id="list"></div>
  </div>

<script src="./phrases.js"></script>
<script>
  const START_DATE = "2026-03-04";

  const STORAGE_KEYS = {
    cycle: "touch_phrases_cycle_v1",
    cycleStart: "touch_phrases_cycle_start_v1"
  };

  const phrases = Array.isArray(window.PHRASES) ? window.PHRASES.filter(Boolean) : [];

  function daysSinceStart(startDateString) {
    const start = new Date(startDateString + "T00:00:00");
    const now = new Date();

    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const startDay = new Date(start.getFullYear(), start.getMonth(), start.getDate());

    const msPerDay = 1000 * 60 * 60 * 24;
    return Math.max(0, Math.floor((today - startDay) / msPerDay));
  }

  function shuffleIndices(length) {
    const arr = Array.from({ length }, (_, i) => i);
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function readJSON(key) {
    try {
      return JSON.parse(localStorage.getItem(key));
    } catch {
      return null;
    }
  }

  function writeJSON(key, value) {
    localStorage.setItem(key, JSON.stringify(value));
  }

  function getOrCreateCycle() {
    const total = phrases.length;
    if (!total) return { order: [], cycleStartDay: 0 };

    const todayOffset = daysSinceStart(START_DATE);
    let order = readJSON(STORAGE_KEYS.cycle);
    let cycleStartDay = readJSON(STORAGE_KEYS.cycleStart);

    const isOrderValid =
      Array.isArray(order) &&
      order.length === total &&
      order.every((n) => Number.isInteger(n) && n >= 0 && n < total);

    const isCycleStartValid = Number.isInteger(cycleStartDay) && cycleStartDay >= 0;

    if (!isOrderValid || !isCycleStartValid) {
      order = shuffleIndices(total);
      cycleStartDay = todayOffset;
      writeJSON(STORAGE_KEYS.cycle, order);
      writeJSON(STORAGE_KEYS.cycleStart, cycleStartDay);
    }

    const cyclesPassed = Math.floor((todayOffset - cycleStartDay) / total);

    if (cyclesPassed > 0) {
      for (let i = 0; i < cyclesPassed; i++) {
        order = shuffleIndices(total);
      }
      cycleStartDay = cycleStartDay + cyclesPassed * total;
      writeJSON(STORAGE_KEYS.cycle, order);
      writeJSON(STORAGE_KEYS.cycleStart, cycleStartDay);
    }

    return { order, cycleStartDay };
  }

  function getTodayPhraseIndex() {
    if (!phrases.length) return -1;

    const todayOffset = daysSinceStart(START_DATE);
    const { order, cycleStartDay } = getOrCreateCycle();
    const positionInCycle = todayOffset - cycleStartDay;

    return order[positionInCycle] ?? 0;
  }

  let currentIndex = getTodayPhraseIndex();

  function setPhrase(index) {
    if (!phrases.length) {
      document.getElementById("phrase").innerText = "add phrases in phrases.js";
      return;
    }

    currentIndex = index;
    document.getElementById("phrase").innerText = phrases[index] || "";
  }

  function showNextPhrase() {
    if (!phrases.length) return;

    const { order } = getOrCreateCycle();
    const currentPos = order.indexOf(currentIndex);
    const nextPos = (currentPos + 1) % order.length;
    setPhrase(order[nextPos]);
  }

  function renderList() {
    const listEl = document.getElementById("list");
    if (!listEl || !phrases.length) return;

    const todayIndex = getTodayPhraseIndex();

    listEl.innerHTML = phrases
      .map((phrase, index) => {
        const label = index === todayIndex ? "today" : `#${index + 1}`;
        return `
          <div class="item" data-i="${index}">
            <small>${label}</small>
            <div>${phrase}</div>
          </div>
        `;
      })
      .join("");

    listEl.querySelectorAll(".item").forEach((item) => {
      item.addEventListener("click", () => {
        const index = Number(item.dataset.i);
        setPhrase(index);
      });
    });
  }

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./service-worker.js");
  }

  document.getElementById("btnNext")?.addEventListener("click", showNextPhrase);

  const listEl = document.getElementById("list");
  document.getElementById("btnToggleList")?.addEventListener("click", () => {
    const isOpen = listEl.style.display === "block";
    listEl.style.display = isOpen ? "none" : "block";
  });

  setPhrase(currentIndex);
  renderList();
</script>
  
</body>
</html>
